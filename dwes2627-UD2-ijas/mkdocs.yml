site_name: DWES 26/27 IES Francisco de los Ríos
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

  - pymdownx.tasklist:
      custom_checkbox: true
copyright: Curso 2025/26 - Antonio Marín - Contacto - pamarin@iesfranciscodelosrios.es - Licencia CC BY-NC-SA 4.0
theme:
  name: material
  palette:
    primary: teal
    accent: teal
  features: 
    navigation.footer
        - content.code.copy
        - navigation.path
        - navigation.prune
        - navigation.top
        #
        #- toc.integrate 

        #https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/?h=navigation#navigation-expansion

        
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
      repo: fontawesome/brands/github

plugins:
  exclude: # Usar este MKDocs Build para excluir carpetas enteras
      glob:
        - _private/*
        - _presentaciones/*
        - 2425/*
        #- UD2-PHP/*
        #- UD2-PHP/Entrega1/3 Datos y funciones.md
        #- UD2-PHP/Entrega2/*
        #- UD2-PHP/Entrega2/6 Arrays.md
        #- UD2-PHP/Entrega2/7 Formularios.md
        #- UD2-PHP/Entrega2/7.1 Programas 30-35.md
        #- UD2-PHP/Entrega2/Entregable.md
        - UD3-POO-copy/*
        #- UD4-AccesoDatos/*
        - UD4-AccesoDatos/privado-PD/*
        #- UD5-HerramientasWeb/*
        #- UD5-HerramientasWeb/4 Autenticación y Recursos.md
        #- UD5-HerramientasWeb/Codigo Programas/4 Recursos/*
        - UD5-HerramientasWeb/privado/*
        #- UD6-Laravel/*
        #- UD6-Laravel/5_Controllers.md
        #- UD6-Laravel/6._CRUD.md
        #- UD6-Laravel/7_Seeder_Fact.md
        #- UD6-Laravel/8_Relationships.md
        #- UD6-Laravel/Actividades/6.5.Controllers.md
        #- UD6-Laravel/Actividades/6.6.CRUD.md
        #- UD6-Laravel/Actividades/6.7.Seeder.md
        - UD6-Laravel/Apuntes Gogodev/*
        #- UD7-REST/*
        - UD8-Hibrido/*
        


