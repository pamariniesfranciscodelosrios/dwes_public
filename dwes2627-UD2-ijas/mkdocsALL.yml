site_name: DWES 25/26 IES Francisco de los Ríos
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.tasklist:
      custom_checkbox: true
copyright: Curso 2025/26 - Antonio Marín - Contacto - pamarin@iesfranciscodelosrios.es - Licencia CC BY-NC-SA 4.0
theme:
  name: material
  palette:
    primary: teal
    accent: teal
  features: 
    navigation.footer
        - content.code.copy
        - navigation.path
        - navigation.prune
        - navigation.top
        - content.tabs.link
        #
        #- toc.integrate 

        #https://squidfunk.github.io/mkdocs-material/setup/setting-up-navigation/?h=navigation#navigation-expansion

        
  icon:
    admonition:
      note: octicons/tag-16
      abstract: octicons/checklist-16
      info: octicons/info-16
      tip: octicons/squirrel-16
      success: octicons/check-16
      question: octicons/question-16
      warning: octicons/alert-16
      failure: octicons/x-circle-16
      danger: octicons/zap-16
      bug: octicons/bug-16
      example: octicons/beaker-16
      quote: octicons/quote-16
      repo: fontawesome/brands/github

plugins:
   exclude: # Usar este MKDocs Build para excluir carpetas enteras
      glob:
        - _private/*
        - _presentaciones/*
        - 2425/*
        #- UD6-Laravel/*
        #- UD7-REST/*
        - UD8-Hibrido/*


